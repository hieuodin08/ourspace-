<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ourspace - Video Call cho người khiếm thính</title>
  <link rel="icon" href="data:," />

  <!-- Thư viện CDN -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- TensorFlow.js để chạy model nhận diện chữ cái ASL (cam/tfjs_model) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

  <!-- Firebase (compat) — Auth + Firestore để chat/danh bạ đồng bộ mọi thiết bị -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <!-- Cấu hình Firebase của bạn (chạy trước các script babel) -->
  <script src="js/firebase-config.js"></script>

  <!-- CSS Lobby -->
  <link rel="stylesheet" href="css/ourspace.css" />

  <!-- Danh bạ "Vũ trụ" (Galaxy) — fonts Outfit + Allura + CSS riêng -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Allura&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/galaxy.css" />

  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    LƯU Ý: File này dùng Babel standalone để transform JSX trong trình duyệt.
    Khi load các file .jsx qua thuộc tính `src`, cần serve qua HTTP (không
    chạy được bằng file:// vì XHR/CORS). Trên Windows có thể chạy nhanh:
        python -m http.server 8000
    rồi mở http://localhost:8000/index.html
    Các file được load theo thứ tự phụ thuộc — không đổi thứ tự bên dưới.
  -->
  <script type="text/babel" data-presets="react" src="js/icons.js"></script>
  <script type="text/babel" data-presets="react" src="js/firebase.js"></script>
  <script type="text/babel" data-presets="react" src="js/db.js"></script>
  <script type="text/babel" data-presets="react" src="js/hooks.js"></script>
  <script type="text/babel" data-presets="react" src="js/sign-engine.js"></script>
  <script type="text/babel" data-presets="react" src="js/asl-engine.js"></script>
  <script type="text/babel" data-presets="react" src="js/peer.js"></script>
  <script type="text/babel" data-presets="react" src="js/components.js"></script>
  <script type="text/babel" data-presets="react" src="js/home.js"></script>
  <script type="text/babel" data-presets="react" src="js/call-room.js"></script>

  <!-- Danh bạ "Vũ trụ" (Galaxy) — nạp theo thứ tự phụ thuộc, TRƯỚC app.js -->
  <script type="text/babel" data-presets="react" src="js/galaxy/data.js"></script>
  <script type="text/babel" data-presets="react" src="js/galaxy/gx-icons.js"></script>
  <script type="text/babel" data-presets="react" src="js/galaxy/parts.js"></script>
  <script type="text/babel" data-presets="react" src="js/galaxy/galaxy.js"></script>
  <script type="text/babel" data-presets="react" src="js/galaxy/comets.js"></script>
  <script type="text/babel" data-presets="react" src="js/galaxy/dock.js"></script>
  <script type="text/babel" data-presets="react" src="js/galaxy/galaxy-view.js"></script>

  <script type="text/babel" data-presets="react" src="js/app.js"></script>
</body>
</html>
